name: Publish to WeChat Official Account

on:
  push:
    paths:
      - 'articles/**.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish articles via SCF proxy
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          echo "=== WeChat Auto Publisher (Direct) ==="
          echo "Runner public IP: $(curl -s --connect-timeout 5 ifconfig.me 2>/dev/null || echo 'unknown')"
          echo "APP_ID length: ${#WECHAT_APP_ID}"
          echo "APP_SECRET length: ${#WECHAT_APP_SECRET}"
          echo ""
          echo "Found articles:"
          ls -la articles/ 2>/dev/null || echo "No articles directory"
          echo ""

          FAILED=0
          for f in articles/*.md; do
            if [ -f "$f" ]; then
              echo "========================================="
              echo "Publishing: $f"
              echo "========================================="
              node scripts/publish.js "$f"
              EXIT=$?
              if [ $EXIT -ne 0 ]; then
                echo "FAILED: $f (exit code: $EXIT)"
                FAILED=1
              else
                echo "SUCCESS: $f"
              fi
              echo ""
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo "ERROR: Some articles failed!"
            exit 1
          fi
          echo "All published!"
