name: Publish to WeChat Official Account

on:
  push:
    paths:
      - 'articles/**.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish articles via SCF proxy
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          echo "Found articles:"
          ls -la articles/ || echo "No articles directory"

          for f in articles/*.md; do
            if [ -f "$f" ]; then
              echo "=== Publishing: $f ==="
              echo "PROXY_URL set: ${PROXY_URL:+yes}"
              echo "APP_ID set: ${WECHAT_APP_ID:+yes}"
              node scripts/publish.js "$f" || echo "publish.js failed with exit code $?"
            fi
          done
          echo "All done"
